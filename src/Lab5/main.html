<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab-5 Konovalov</title>
    <link rel="stylesheet" href="../index.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="../favicon.ico" />
  </head>
  <body>
    <main class="page lab5-page">
      <p class="title">Pixel Hunt</p>
      <p class="subtitle">Клікни на блок до завершення таймера</p>
      <a class="back-button" href="../index.html">Головна</a>

      <section class="controls">
        <label>
          Складність
          <select id="difficultyInput">
            <option value="easy">Легка</option>
            <option value="normal" selected>Середня</option>
            <option value="hard">Складна</option>
          </select>
        </label>

        <label>
          Колір блоку
          <input id="colorInput" type="color" value="#ff7a00" />
        </label>

        <button id="startBtn" class="back-button" type="button">Почати / Перезапустити</button>
      </section>

      <section class="hud">
        <p>Рахунок: <strong id="scoreValue">0</strong></p>
        <p>Час: <strong id="leftTimeValue">0.00 с</strong></p>
        <p>Складність: <strong id="activeDifficulty">Середня</strong></p>
      </section>

      <div id="playfield" class="playfield">
        <button id="target" class="target hidden" type="button" aria-label="ціль"></button>
      </div>

      <p id="statusText" class="status">Натисни кнопку, щоб почати гру.</p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
